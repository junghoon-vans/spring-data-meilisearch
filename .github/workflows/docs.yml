name: Reference Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout (leave empty for current branch)'
        required: false
        default: ''
      path:
        description: 'Destination path, such as 1.0.0 (leave empty for root or inferred tag path)'
        required: false
        default: ''
      update-root:
        description: 'Also update / with this documentation build'
        required: false
        type: boolean
        default: false

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_path: ${{ steps.publish-target.outputs.target_path }}
      update_root: ${{ steps.publish-target.outputs.update_root }}
      versioned: ${{ steps.publish-target.outputs.versioned }}
    steps:
      - name: Resolve documentation target
        id: publish-target
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_REF: ${{ inputs.ref }}
          DISPATCH_PATH: ${{ inputs.path }}
          DISPATCH_UPDATE_ROOT: ${{ inputs.update-root }}
        run: |
          target_path=""
          update_root="false"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            target_path="pr-${PR_NUMBER}"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            target_path="${REF_NAME#v}"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            target_path="$DISPATCH_PATH"
            update_root="$DISPATCH_UPDATE_ROOT"

            if [ -z "$target_path" ]; then
              dispatch_ref="${DISPATCH_REF#refs/tags/}"
              if [[ "$dispatch_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                target_path="${dispatch_ref#v}"
              fi
            fi
          fi

          versioned="false"
          if [ -n "$target_path" ]; then
            if [ "$EVENT_NAME" = "pull_request" ]; then
              if [[ ! "$target_path" =~ ^pr-[0-9]+$ ]]; then
                echo "::error::Pull request documentation path must be a PR preview path."
                exit 1
              fi
            elif [[ ! "$target_path" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Documentation path must be a release version such as 1.0.0."
              exit 1
            fi

            versioned="true"
          fi

          {
            echo "target_path=$target_path"
            echo "update_root=$update_root"
            echo "versioned=$versioned"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      - name: Build versioned documentation
        if: steps.publish-target.outputs.versioned == 'true'
        run: ./mvnw -Pantora antora:antora

      - name: Prepare Antora CLI for publish documentation
        if: steps.publish-target.outputs.versioned != 'true'
        run: ./mvnw -Pantora antora:antora

      - name: Build publish documentation
        if: steps.publish-target.outputs.versioned != 'true'
        run: |
          rm -rf target/site
          node src/main/antora/generate-publish-playbook.mjs
          npx --offline antora --to-dir target/site target/antora-publish-playbook.yml
          node src/main/antora/generate-latest-version-redirects.mjs target/site
      - name: Upload reference documentation
        uses: actions/upload-artifact@v4
        with:
          name: reference-documentation
          path: ./target/site
          if-no-files-found: error

  deploy:
    needs: build
    if: |
      always() &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      ) &&
      (
        needs.build.result == 'success' ||
        (
          github.event_name == 'pull_request' &&
          github.event.action == 'closed'
        )
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    env:
      DOCS_DIR: reference-documentation
      SITE_BRANCH: pages-content
      SITE_DIR: site
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Checkout Pages content
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: pages-content
          path: site

      - name: Initialize Pages content
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ ! -d "$SITE_DIR/.git" ]; then
            rm -rf "$SITE_DIR"
            mkdir -p "$SITE_DIR"
            git init "$SITE_DIR"
            git -C "$SITE_DIR" checkout --orphan "$SITE_BRANCH"
            git -C "$SITE_DIR" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git -C "$SITE_DIR" config user.name "github-actions[bot]"
          git -C "$SITE_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch "$SITE_DIR/.nojekyll"

      - name: Download reference documentation
        if: github.event_name != 'pull_request' || github.event.action != 'closed'
        uses: actions/download-artifact@v4
        with:
          name: reference-documentation
          path: reference-documentation

      - name: Stage Pages content
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_PATH: ${{ needs.build.outputs.target_path }}
          UPDATE_ROOT: ${{ needs.build.outputs.update_root }}
        run: |
          normalize_javadoc_links() {
            local docs_root="$1"

            DOCS_ROOT="$docs_root" node <<'NODE'
          import { readdirSync, readFileSync, statSync, writeFileSync } from 'node:fs';
          import { dirname, join, relative, resolve, sep } from 'node:path';

          const root = resolve(process.env.DOCS_ROOT);
          const javadocRoot = join(root, 'api', 'java');
          let replacements = 0;

          function walk(directory) {
            for (const entry of readdirSync(directory)) {
              const path = join(directory, entry);
              const stat = statSync(path);

              if (stat.isDirectory()) {
                walk(path);
                continue;
              }

              if (!path.endsWith('.html')) {
                continue;
              }

              const content = readFileSync(path, 'utf8');
              const relativeJavadocRoot = relative(dirname(path), javadocRoot).split(sep).join('/') || '.';
              const normalized = content.replace(/href=(['"])\/api\/java\//g, (_match, quote) => {
                replacements += 1;
                return `href=${quote}${relativeJavadocRoot}/`;
              });

              if (normalized !== content) {
                writeFileSync(path, normalized);
              }
            }
          }

          walk(root);
          console.log(`Normalized ${replacements} root-relative Javadoc link(s) in ${root}.`);
          NODE
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            target_path="pr-${PR_NUMBER}"

            if [ "$EVENT_ACTION" = "closed" ]; then
              rm -rf "${SITE_DIR:?}/${target_path:?}"
              touch "$SITE_DIR/.nojekyll"
              exit 0
            fi

            rm -rf "${SITE_DIR:?}/${target_path:?}"
            mkdir -p "$SITE_DIR/$target_path"
            cp -a "$DOCS_DIR/." "$SITE_DIR/$target_path/"
            normalize_javadoc_links "$SITE_DIR/$target_path"
          else
            refresh_root() {
              find "$SITE_DIR" -mindepth 1 -maxdepth 1 \
                ! -name ".git" \
                ! -name ".nojekyll" \
                ! -name "pr-*" \
                ! -name "[0-9]*.[0-9]*.[0-9]*" \
                -exec rm -rf {} +
              cp -a "$DOCS_DIR/." "$SITE_DIR/"
              normalize_javadoc_links "$SITE_DIR"
            }

            if [ -n "$TARGET_PATH" ]; then
              rm -rf "${SITE_DIR:?}/${TARGET_PATH:?}"
              mkdir -p "$SITE_DIR/$TARGET_PATH"
              cp -a "$DOCS_DIR/." "$SITE_DIR/$TARGET_PATH/"
              normalize_javadoc_links "$SITE_DIR/$TARGET_PATH"
            else
              refresh_root
            fi

            if [ "$UPDATE_ROOT" = "true" ]; then
              refresh_root
            fi
          fi

          touch "$SITE_DIR/.nojekyll"

      - name: Commit Pages content
        id: commit
        run: |
          git -C "$SITE_DIR" add -A

          if git -C "$SITE_DIR" diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C "$SITE_DIR" commit -m "Update reference documentation"
          git -C "$SITE_DIR" push origin HEAD:"$SITE_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Prepare Pages artifact
        if: steps.commit.outputs.changed == 'true'
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -a "$SITE_DIR/." pages-artifact/
          rm -rf pages-artifact/.git

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR preview URL
        if: |
          steps.commit.outputs.changed == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.action != 'closed'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- reference-documentation-preview -->';
            const body = `${marker}\nReference documentation preview: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const previous = comments.data.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
